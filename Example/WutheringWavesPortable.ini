[General]
;主程序
application=App\Client\Binaries\Win64\Client-Win64-Shipping.exe

;命令行
commandline=-SkipSplash

;工作目录
;workdir=Data

;临时文件
tempfile=Data

;多实例
;multiple=1

;崩溃清理后等待
;单位: 毫秒
;crashwait=500

;等待进程
;进程 :: 匹配 :: 路径
;通配符 = ? | *
;匹配值 = path
waitprocess=KRSDKExternal.exe

;前台进程
foreground={EXENAME}

;挂起进程
suspend=chrome.exe
suspend=TrafficMonitor.exe
suspend=ListaryHelper64.exe
suspend=ListaryHookHelper32.exe
suspend=ListaryHookHelper64.exe
suspend=ListaryService.exe

;备份间隔
;单位: 分
backuptime=10

;备份目录
;源 :: 目标 :: 覆盖
;覆盖 = overwrite | no overwrite
;backupdir={Roaming}\Portable :: Data\#Backup\Portable

;备份文件
;源 :: 目标 :: 覆盖
;覆盖 = overwrite | no overwrite
;backupfile={Roaming}\Portable.ini :: Data\#Backup\Portable.ini

[Hook]
;挂钩文件操作
;1=重定向系统分区
;2=重定向所有分区
;3=隐藏非系统分区
;4=重定向用户目录
;hookfile=1

;挂钩注册表操作
;hookreg=1

;挂钩重定向路径
hookpath=Data

;挂钩写入复制限制
;单位: MB
hookcopysize=80

;挂钩阻止联网
;1=允许DNS解析
;2=阻止DNS解析
;hooknet=1

;挂钩伪造系统语言
;简中/繁中 | 936/950
;日语/韩语 | 932/949
;俄语/西欧/中欧 | 1251/1252/1250
;hooklocale=932

;挂钩替换字体
;hookfont=Microsoft YaHei

;挂钩虚拟光驱
;hookcd=Other\Crack

;挂钩伪造系统时间
;年/月/日 :: 时:分
;时间不写则使用真实时间
;hooktime=2026/4/4 :: 4:4

;挂钩伪造卷序列号
;伪造系统和启动器分区
;hookvolumeid=1234-5678

;挂钩子进程
;hookchild=0

;挂钩子进程名称
;默认挂钩所有子进程
;hookchildname=Portable.exe

;注入其他DLL
;injector=Other\Portable.dll

